<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f3ea;
    }

    .container {
      padding: 16px;
    }

    h1 {
      margin: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #f65f4c;
      color: white;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      background: #eee;
      text-align: center;
      cursor: pointer;
    }

    .tab.active {
      background: #f65f4c;
      color: white;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .grid {
      display: flex;
      overflow-x: auto;
      gap: 10px;
    }

    .meal {
      min-width: 120px;
      text-align: center;
      cursor: pointer;
    }

    .meal img {
      width: 100px;
      height: 70px;
      object-fit: cover;
      border-radius: 10px;
    }

    .meal.selected {
      outline: 3px solid #f65f4c;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Courses</h1>
    <button onclick="alert('Paramètres bientôt')">🗂️</button>
  </div>

  <div class="tabs">
    <div class="tab active">Plats</div>
    <div class="tab">Rayons</div>
    <div class="tab">Liste</div>
  </div>

  <div class="card">
    <h3>Plats</h3>

    <div class="grid" id="meals"></div>

  </div>

</div>

<script>
const meals = [
  { name: "Pizza", img: "images/Pizza.WEBP" },
  { name: "Lasagnes", img: "images/Lasagnes.JPG" },
  { name: "Couscous", img: "images/Couscous.WEBP" },
  { name: "Omelette", img: "images/Omelette.JPG" },
  { name: "Gratin", img: "images/Gratin-de-courgettes.WEBP" },
  { name: "Croques", img: "images/Croques-monsieur.jpeg" }
];

const container = document.getElementById("meals");

meals.forEach((meal, index) => {
  const div = document.createElement("div");
  div.className = "meal";

  div.innerHTML = `
    <img src="${meal.img}">
    <div>${meal.name}</div>
  `;

  div.onclick = () => {
    div.classList.toggle("selected");
  };

  container.appendChild(div);
});
</script>

</body>
</html>
